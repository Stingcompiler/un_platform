version: "1"

services:
  - type: web
    name: emarate-college-backend
    env: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/auth/health/

    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "school-ms-m6ns.onrender.com,eust.edu.sd,www.eust.edu.sd"
      - key: DATABASE_URL
        fromDatabase:
          name: university-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://eust.edu.sd,https://www.eust.edu.sd,https://school-ms-m6ns.onrender.com"
      # Bunny.net keys — set these manually in the Render dashboard
      - key: BUNNY_STORAGE_ZONE
        sync: false
      - key: BUNNY_STORAGE_PASSWORD
        sync: false
      - key: BUNNY_STORAGE_REGION
        value: "de"
      - key: BUNNY_CDN_HOSTNAME
        sync: false
      - key: BUNNY_STREAM_LIBRARY_ID
        sync: false
      - key: BUNNY_STREAM_API_KEY
        sync: false

databases:
  - name: university-db
    databaseName: university_db
    user: university_user
    region: frankfurt
    plan: free
